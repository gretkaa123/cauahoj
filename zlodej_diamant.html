<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zloději v Bance - Hra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #00d4ff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00d4ff;
            font-size: 36px;
        }

        .info {
            color: #00ff00;
            margin-bottom: 15px;
            font-size: 14px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .info-item {
            background: rgba(0, 255, 0, 0.1);
            padding: 8px 15px;
            border-radius: 5px;
            border: 1px solid #00ff00;
        }

        #gameBoard {
            position: relative;
            width: 800px;
            height: 600px;
            background: linear-gradient(135deg, #0f3460, #1a5f7a);
            border: 3px solid #00d4ff;
            margin: 20px auto;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .player {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #ff6b00, #cc5500);
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            z-index: 10;
            transition: all 0.1s;
            border: 2px solid #ff8800;
        }

        .laser {
            position: absolute;
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        .diamond {
            position: absolute;
            width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            z-index: 5;
            animation: diamondGlow 1s infinite;
        }

        @keyframes diamondGlow {
            0%, 100% {
                transform: scale(1);
                text-shadow: 0 0 10px #ffff00;
            }
            50% {
                transform: scale(1.1);
                text-shadow: 0 0 20px #ffff00;
            }
        }

        .status {
            color: #00ff00;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            height: 30px;
        }

        .status.warning {
            color: #ff6600;
        }

        .status.danger {
            color: #ff0000;
        }

        .status.success {
            color: #00ff00;
        }

        .status.game-over {
            color: #ff0000;
            font-size: 24px;
        }

        .controls {
            color: #00d4ff;
            margin-top: 20px;
            font-size: 14px;
            background: rgba(0, 212, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #00d4ff;
        }

        button {
            background: linear-gradient(135deg, #ff6b00, #ff8800);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(255, 107, 0, 0.5);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.8);
        }

        button:active {
            transform: scale(0.95);
        }

        .level-info {
            color: #00ff00;
            margin-top: 15px;
            font-size: 16px;
        }

        .game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .game-over-modal.active {
            display: flex;
        }

        .modal-content {
            text-align: center;
            animation: scaleIn 0.5s;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-image {
            max-width: 600px;
            max-height: 400px;
            border-radius: 10px;
            border: 3px solid #ff0000;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }

        .modal-text {
            color: #ff0000;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff0000;
        }

        .modal-button {
            background: linear-gradient(135deg, #ff6b00, #ff8800);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.5);
        }

        .modal-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(255, 107, 0, 0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💎 ZLODĚJI V BANCE 💎</h1>
        
        <div class="info">
            <div class="info-item">⏱️ Čas: <span id="timer">0</span>s</div>
            <div class="info-item">💰 Skóre: <span id="score">0</span></div>
            <div class="info-item">📊 Úroveň: <span id="level">1</span></div>
        </div>

        <div id="gameBoard">
            <div id="player" class="player">🕵️</div>
            <div id="diamond" class="diamond">💎</div>
        </div>

        <div id="gameOverModal" class="game-over-modal">
            <div class="modal-content">
                <div class="modal-text">☠️ CHYCEN! ☠️</div>
                <div style="font-size: 120px; margin: 20px 0; animation: pulse 0.5s infinite;">🚨</div>
                <div style="color: #ff6600; font-size: 24px; margin-bottom: 20px; font-weight: bold;">LASERY TĚ CHYTILY!</div>
                <div style="color: #ffff00; font-size: 18px; margin-bottom: 30px;">Měl jsi být opatrnější...</div>
                <button class="modal-button" onclick="restartFromModal()">Zkusit znovu</button>
            </div>
        </div>

        <div id="status" class="status"></div>
        
        <div class="level-info">
            Pokud dosáhneš všech diamantů, postoupíš na vyšší úroveň!
        </div>

        <div class="controls">
            🎮 <strong>Ovládání:</strong> Použij ŠIPKY pro pohyb 🕵️<br>
            🚨 Vyhýbej se červeným laserům!<br>
            💎 Dostaň se k diamantu bez dotyku laseru!
        </div>

        <button onclick="resetGame()">Nová Hra</button>
    </div>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const player = document.getElementById('player');
        const diamond = document.getElementById('diamond');
        const statusDiv = document.getElementById('status');
        const timerSpan = document.getElementById('timer');
        const scoreSpan = document.getElementById('score');
        const levelSpan = document.getElementById('level');
        const gameOverModal = document.getElementById('gameOverModal');

        let playerX = 380;
        let playerY = 560;
        let playerSize = 40;
        let gameRunning = true;
        let score = 0;
        let level = 1;
        let time = 0;
        let lasers = [];
        let diamondX = 750;
        let diamondY = 30;
        let diamondsCollected = 0;

        const keys = {};
        const playerSpeed = 5;

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function updatePlayerPosition() {
            if (keys['ArrowUp'] && playerY > 0) {
                playerY -= playerSpeed;
            }
            if (keys['ArrowDown'] && playerY < gameBoard.clientHeight - playerSize) {
                playerY += playerSpeed;
            }
            if (keys['ArrowLeft'] && playerX > 0) {
                playerX -= playerSpeed;
            }
            if (keys['ArrowRight'] && playerX < gameBoard.clientWidth - playerSize) {
                playerX += playerSpeed;
            }

            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';
        }

        function createLasers() {
            const laserCount = 3 + level;
            lasers = [];

            for (let i = 0; i < laserCount; i++) {
                const isHorizontal = i % 2 === 0;
                const laser = {
                    x: isHorizontal ? 0 : Math.random() * (gameBoard.clientWidth - 20),
                    y: isHorizontal ? i * 80 + 60 : 0,
                    width: isHorizontal ? gameBoard.clientWidth : 20,
                    height: isHorizontal ? 15 : gameBoard.clientHeight,
                    isHorizontal: isHorizontal,
                    speed: 2 + level * 0.5,
                    element: null
                };

                laser.element = document.createElement('div');
                laser.element.className = 'laser';
                gameBoard.appendChild(laser.element);
                lasers.push(laser);
            }
        }

        function updateLasers() {
            lasers.forEach(laser => {
                if (laser.isHorizontal) {
                    laser.x += laser.speed;
                    if (laser.x > gameBoard.clientWidth) {
                        laser.x = -laser.width;
                    }
                } else {
                    laser.y += laser.speed;
                    if (laser.y > gameBoard.clientHeight) {
                        laser.y = -laser.height;
                    }
                }

                laser.element.style.left = laser.x + 'px';
                laser.element.style.top = laser.y + 'px';
                laser.element.style.width = laser.width + 'px';
                laser.element.style.height = laser.height + 'px';
            });
        }

        function checkCollision(x1, y1, w1, h1, x2, y2, w2, h2) {
            return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
        }

        function checkLaserCollision() {
            for (let laser of lasers) {
                if (checkCollision(playerX, playerY, playerSize, playerSize,
                    laser.x, laser.y, laser.width, laser.height)) {
                    return true;
                }
            }
            return false;
        }

        function checkDiamondCollision() {
            return checkCollision(playerX, playerY, playerSize, playerSize,
                diamondX, diamondY, 35, 35);
        }

        function placeDiamond() {
            diamondX = Math.random() * (gameBoard.clientWidth - 35);
            diamondY = Math.random() * (gameBoard.clientHeight - 100);
            diamond.style.left = diamondX + 'px';
            diamond.style.top = diamondY + 'px';
        }

        function nextLevel() {
            level++;
            diamondsCollected = 0;
            score += 500;
            scoreSpan.textContent = score;
            levelSpan.textContent = level;
            createLasers();
            placeDiamond();
            statusDiv.textContent = '✨ POSTOUPIL JSI NA ÚROVEŇ ' + level + '! ✨';
            statusDiv.className = 'status success';
        }

        function gameOver() {
            gameRunning = false;
            player.style.opacity = '0.5';
            gameOverModal.classList.add('active');
        }

        function restartFromModal() {
            gameOverModal.classList.remove('active');
            resetGame();
        }

        function gameLoop() {
            if (!gameRunning) return;

            updatePlayerPosition();
            updateLasers();

            // Kontrola kolize s laserem
            if (checkLaserCollision()) {
                gameOver();
                return;
            }

            // Kontrola kolize s diamantem
            if (checkDiamondCollision()) {
                diamondsCollected++;
                score += 100;
                scoreSpan.textContent = score;

                if (diamondsCollected >= 2) {
                    nextLevel();
                } else {
                    placeDiamond();
                    statusDiv.textContent = '💎 +100! Ještě ' + (2 - diamondsCollected) + ' diamant(ů)!';
                    statusDiv.className = 'status success';
                }
            }

            // Aktualizace stavu
            const distanceToDiamond = Math.sqrt(
                Math.pow(playerX - diamondX, 2) + Math.pow(playerY - diamondY, 2)
            );

            if (distanceToDiamond < 100) {
                statusDiv.textContent = '🔥 Diamant je blízko!';
                statusDiv.className = 'status danger';
            } else if (distanceToDiamond < 200) {
                statusDiv.textContent = '📍 Diamant se blíží...';
                statusDiv.className = 'status warning';
            } else {
                statusDiv.textContent = '🔍 Hledej diamant!';
                statusDiv.className = 'status';
            }

            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            // Vyčisti staré lasery
            lasers.forEach(laser => laser.element.remove());

            // Skryj modal
            gameOverModal.classList.remove('active');

            playerX = 380;
            playerY = 560;
            gameRunning = true;
            score = 0;
            level = 1;
            time = 0;
            diamondsCollected = 0;

            scoreSpan.textContent = score;
            levelSpan.textContent = level;
            player.style.opacity = '1';
            statusDiv.textContent = '🎮 Hra spuštěna!';
            statusDiv.className = 'status success';

            createLasers();
            placeDiamond();
            
            // Timer
            const timerInterval = setInterval(() => {
                if (gameRunning) {
                    time++;
                    timerSpan.textContent = time;
                } else {
                    clearInterval(timerInterval);
                }
            }, 1000);

            gameLoop();
        }

        // Spustit hru
        resetGame();
    </script>
</body>
</html>
